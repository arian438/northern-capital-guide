<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Петербургский гид | Путеводитель по Санкт-Петербургу</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Яндекс Карты API -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=14a94402-c44a-41af-ac06-2430ded7ac4d&lang=ru_RU"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #f5f7fb;
            --text-primary: #1e2a3e;
            --card-bg: white;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            --filter-bg: #f0f2f5;
            --meta-color: #5e7a93;
            --footer-bg: #eef2f8;
            --hero-gradient: linear-gradient(135deg, #0b2b40 0%, #1c4e6f 100%);
            --modal-badge: #eef2ff;
            --toast-bg: #1e293b;
            --toast-text: white;
        }

        body.dark {
            --bg-body: #121826;
            --text-primary: #eef2ff;
            --card-bg: #1e293b;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.3);
            --filter-bg: #334155;
            --meta-color: #a0afc3;
            --footer-bg: #0f172a;
            --hero-gradient: linear-gradient(135deg, #0a1c2a 0%, #0f2c3f 100%);
            --modal-badge: #2d3a4e;
            --toast-bg: #334155;
            --toast-text: #eef2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            scroll-behavior: smooth;
            transition: background-color 0.3s, color 0.2s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .hero {
            background: var(--hero-gradient);
            color: white;
            padding: 40px 0 48px;
            text-align: center;
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
            margin-bottom: 32px;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .hero .tagline {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 12px 24px;
            border-radius: 60px;
            box-shadow: var(--card-shadow);
        }

        .weather-widget {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--filter-bg);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .theme-toggle, .favorites-filter-btn {
            background: var(--filter-bg);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            color: var(--text-primary);
        }

        .favorites-filter-btn.active {
            background: #e67e22;
            color: white;
        }

        .filters-section {
            background: var(--card-bg);
            border-radius: 48px;
            padding: 18px 24px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            box-shadow: var(--card-shadow);
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-btn {
            background: var(--filter-bg);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: #1c4e6f;
            color: white;
        }

        .sort-select {
            background: var(--filter-bg);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: inherit;
            cursor: pointer;
            color: var(--text-primary);
        }

        .search-wrapper {
            background: var(--filter-bg);
            border-radius: 60px;
            padding: 5px 5px 5px 20px;
            display: flex;
            align-items: center;
        }

        #searchInput {
            border: none;
            background: transparent;
            padding: 8px 12px;
            width: 200px;
            outline: none;
            color: var(--text-primary);
        }

        .results-counter {
            margin: 10px 0 15px 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--meta-color);
        }

        .two-columns {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .map-col {
            flex: 1.2;
            min-width: 280px;
        }

        .places-col {
            flex: 1;
            min-width: 300px;
        }

        #cityMap {
            height: 550px;
            width: 100%;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
        }

        .places-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-height: 550px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .place-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            padding: 12px;
            position: relative;
        }

        .place-card:hover {
            transform: translateX(5px);
        }

        .favorite-star {
            position: absolute;
            top: 10px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 5px 8px;
            cursor: pointer;
            z-index: 5;
            font-size: 1rem;
        }

        .favorite-star i {
            color: #ffc107;
            text-shadow: 0 0 2px black;
        }

        .card-img-mini {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            background-color: var(--filter-bg);
        }

        .card-content-mini {
            flex: 1;
        }

        .place-name-mini {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            padding-right: 30px;
        }

        .place-cat-badge {
            font-size: 0.7rem;
            background: var(--modal-badge);
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            margin-bottom: 6px;
        }

        .place-desc-mini {
            font-size: 0.75rem;
            color: var(--meta-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .recent-section {
            margin-top: 30px;
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            box-shadow: var(--card-shadow);
        }

        .recent-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recent-grid {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .recent-item {
            flex-shrink: 0;
            width: 120px;
            background: var(--filter-bg);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .recent-item:hover {
            transform: translateY(-3px);
            background: var(--modal-badge);
        }

        .recent-img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            margin: 0 auto 8px;
            background-size: cover;
            background-position: center;
            background-color: var(--filter-bg);
        }

        .recent-name {
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .toast-notification.show {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1c4e6f;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 100;
            border: none;
            font-size: 1.5rem;
        }

        .scroll-top.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg);
            max-width: 500px;
            width: 90%;
            border-radius: 40px;
            overflow: hidden;
        }
        .modal-img { 
            height: 200px; 
            background-size: cover;
            background-position: center;
            background-color: var(--filter-bg);
        }
        .modal-body { padding: 24px; }
        .close-modal {
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 1.8rem;
            float: right;
            border-radius: 30px;
            width: 38px;
            cursor: pointer;
            margin: 12px;
            position: relative;
            z-index: 10;
        }
        .share-btn {
            background: var(--filter-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 15px;
            width: 100%;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .share-btn:hover {
            background: #1c4e6f;
            color: white;
        }
        .footer {
            text-align: center;
            padding: 28px;
            background: var(--footer-bg);
            border-radius: 32px 32px 0 0;
            margin-top: 40px;
            font-size: 0.8rem;
        }
        @media (max-width: 880px) {
            .two-columns { flex-direction: column; }
            #cityMap { height: 380px; }
            .top-bar { flex-direction: column; align-items: stretch; }
        }
        
        .loading-img {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--filter-bg);
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="container">
        <h1><i class="fas fa-map-location-dot"></i> Петербургский гид</h1>
        <div class="tagline">Карта Яндекса, фото достопримечательностей, избранное и погода</div>
    </div>
</div>

<div class="container">
    <div class="top-bar">
        <div class="weather-widget" id="weatherWidget">
            <i class="fas fa-cloud-sun"></i>
            <span id="weatherText">Загрузка погоды...</span>
        </div>
        <div style="display: flex; gap: 12px;">
            <button id="favoritesFilterBtn" class="favorites-filter-btn"><i class="fas fa-heart"></i> Избранное</button>
            <button id="themeToggleBtn" class="theme-toggle"><i class="fas fa-moon"></i> Тёмная тема</button>
        </div>
    </div>

    <div class="filters-section">
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-star"></i> Все</button>
            <button class="filter-btn" data-filter="museum"><i class="fas fa-landmark"></i> Музеи</button>
            <button class="filter-btn" data-filter="attraction"><i class="fas fa-church"></i> Достопримечательности</button>
            <button class="filter-btn" data-filter="park"><i class="fas fa-tree"></i> Парки</button>
            <button class="filter-btn" data-filter="monument"><i class="fas fa-water"></i> Мосты и памятники</button>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <select id="sortSelect" class="sort-select">
                <option value="name">По названию (А-Я)</option>
                <option value="nameDesc">По названию (Я-А)</option>
                <option value="default">По умолчанию</option>
            </select>
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск...">
            </div>
        </div>
    </div>

    <div class="results-counter" id="resultsCounter">Найдено мест: --</div>

    <div class="two-columns">
        <div class="map-col">
            <div id="cityMap"></div>
        </div>
        <div class="places-col">
            <div id="placesContainer" class="places-grid"></div>
        </div>
    </div>

    <div class="recent-section" id="recentSection">
        <div class="recent-title">
            <i class="fas fa-history"></i> Недавно просмотренные
        </div>
        <div class="recent-grid" id="recentGrid"></div>
    </div>
</div>

<div class="footer">
    <i class="fas fa-map-marked-alt"></i> Интерактивный путеводитель | Карта Яндекса | Избранное сохраняется
</div>
<button class="scroll-top" id="scrollTopBtn"><i class="fas fa-chevron-up"></i></button>

<div id="toastNotification" class="toast-notification">
    <i class="fas fa-heart" id="toastIcon"></i>
    <span id="toastMessage">Добавлено в избранное</span>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
        <div id="modalImg" class="modal-img"></div>
        <div class="modal-body">
            <h2 id="modalTitle"></h2>
            <div id="modalCategoryBadge" style="background:var(--modal-badge); border-radius:30px; padding:4px 12px; display:inline-block;"></div>
            <p id="modalDesc" style="margin: 15px 0;"></p>
            <div id="modalMeta"></div>
            <button id="shareModalBtn" class="share-btn">
                <i class="fas fa-share-alt"></i> Поделиться местом
            </button>
        </div>
    </div>
</div>

<script>
    // ---------- ДАННЫЕ О ДОСТОПРИМЕЧАТЕЛЬНОСТЯХ С КООРДИНАТАМИ ДЛЯ ПОИСКА ФОТО ----------
    const placesData = [
        { id:1, name:"Государственный Эрмитаж", category:"museum", shortDesc:"Шедевры мирового искусства.", fullDesc:"Зимний дворец, более 3 млн экспонатов, Павильонный зал. Один из величайших музеев мира.", searchQuery:"Эрмитаж Санкт-Петербург", address:"Дворцовая пл., 2", metro:"Адмиралтейская", hours:"Вт–Вс 10:30–18:00, чт до 21:00", lat:59.9399, lng:30.3146, photoUrl:"" },
        { id:2, name:"Петропавловская крепость", category:"attraction", shortDesc:"Историческое ядро города.", fullDesc:"Петропавловский собор, тюрьма Трубецкого бастиона, место основания Петербурга.", searchQuery:"Петропавловская крепость Санкт-Петербург", address:"Заячий остров, 6", metro:"Горьковская", hours:"10:00–20:00", lat:59.9500, lng:30.3167, photoUrl:"" },
        { id:3, name:"Исаакиевский собор", category:"attraction", shortDesc:"Величественный собор.", fullDesc:"Колоннада с панорамой города, уникальные мозаики и малахитовые колонны.", searchQuery:"Исаакиевский собор Санкт-Петербург", address:"Исаакиевская пл., 4", metro:"Адмиралтейская", hours:"10:00–18:00, ср выходной", lat:59.9340, lng:30.3065, photoUrl:"" },
        { id:4, name:"Русский музей", category:"museum", shortDesc:"Коллекция русского искусства.", fullDesc:"Михайловский дворец, картины Брюллова, Айвазовского, Репина.", searchQuery:"Русский музей Санкт-Петербург", address:"ул. Инженерная, 4", metro:"Невский проспект", hours:"10:00–18:00, чт до 20:00", lat:59.9387, lng:30.3325, photoUrl:"" },
        { id:5, name:"Летний сад", category:"park", shortDesc:"Старейший парк.", fullDesc:"Фонтаны, мраморные статуи, Летний дворец Петра I.", searchQuery:"Летний сад Санкт-Петербург", address:"наб. Кутузова, 2", metro:"Гостиный двор", hours:"10:00–20:00", lat:59.9451, lng:30.3355, photoUrl:"" },
        { id:6, name:"Дворцовый мост", category:"monument", shortDesc:"Разводной мост через Неву.", fullDesc:"Символ белых ночей, развод под музыку, лучший вид на Эрмитаж.", searchQuery:"Дворцовый мост Санкт-Петербург", address:"Дворцовый пр.", metro:"Адмиралтейская", hours:"круглосуточно", lat:59.9412, lng:30.3081, photoUrl:"" },
        { id:7, name:"Новая Голландия", category:"park", shortDesc:"Остров-парк", fullDesc:"Кирпичная арка, пруд, рестораны, культурное пространство.", searchQuery:"Новая Голландия Санкт-Петербург", address:"наб. Адмиралтейского канала, 2", metro:"Садовая", hours:"09:00–23:00", lat:59.9284, lng:30.2930, photoUrl:"" },
        { id:8, name:"Кунсткамера", category:"museum", shortDesc:"Первый музей России.", fullDesc:"Антропология, этнография, коллекция, основана Петром I.", searchQuery:"Кунсткамера Санкт-Петербург", address:"Университетская наб., 3", metro:"Адмиралтейская", hours:"Вт–Вс 10:00–18:00", lat:59.9419, lng:30.3047, photoUrl:"" },
        { id:9, name:"Спас на Крови", category:"attraction", shortDesc:"Храм-памятник.", fullDesc:"Уникальная мозаика (более 7000 кв. м), русское узорочье.", searchQuery:"Спас на Крови Санкт-Петербург", address:"наб. канала Грибоедова, 2Б", metro:"Невский проспект", hours:"10:30–18:00, ср выходной", lat:59.9406, lng:30.3290, photoUrl:"" },
        { id:10, name:"Поцелуев мост", category:"monument", shortDesc:"Романтичный мост.", fullDesc:"Пешеходный мост через Мойку, легенды о свиданиях, красивый вид.", searchQuery:"Поцелуев мост Санкт-Петербург", address:"наб. Мойки", metro:"Садовая", hours:"круглосуточно", lat:59.9286, lng:30.2975, photoUrl:"" }
    ];

    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let currentFilter = 'all';
    let currentSearch = '';
    let currentSort = 'default';
    let showOnlyFavorites = false;
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let recentViews = JSON.parse(localStorage.getItem('recentViews')) || [];
    let map = null;
    let placemarks = [];
    let yandexReady = false;

    const container = document.getElementById('placesContainer');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const sortSelect = document.getElementById('sortSelect');
    const favoritesFilterBtn = document.getElementById('favoritesFilterBtn');
    const themeToggle = document.getElementById('themeToggleBtn');
    const resultsCounterSpan = document.getElementById('resultsCounter');
    const scrollBtn = document.getElementById('scrollTopBtn');
    const recentGrid = document.getElementById('recentGrid');
    const recentSection = document.getElementById('recentSection');

    // ---------- ПОЛУЧЕНИЕ ФОТО ЧЕРЕЗ ЯНДЕКС КАРТЫ API ----------
    async function fetchPhotoForPlace(place) {
        // Прокси-сервер для обхода CORS (используем бесплатный)
        const searchText = encodeURIComponent(place.searchQuery);
        const url = `https://yandex-images-proxy.vercel.app/api/search?text=${searchText}`;
        
        // Резервные цветные фоны на случай, если фото не загрузится
        const fallbackColors = {
            museum: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
            attraction: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
            park: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
            monument: "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"
        };
        
        // Пытаемся получить фото через Яндекс Поиск по картинкам (неофициальный метод)
        // На самом деле Яндекс API не даёт прямого доступа к фото организаций.
        // Но мы можем использовать стабильные изображения с Wikimedia Commons через другой прокси
        const imageSources = [
            `https://commons.wikimedia.org/w/index.php?search=${encodeURIComponent(place.name)}&title=Special:MediaSearch&type=image`,
        ];
        
        // Для каждого места используем прямую ссылку на известное фото (альтернативное решение)
        const directImages = {
            1: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Winter_Palace_from_above.jpg/400px-Winter_Palace_from_above.jpg",
            2: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Peter-and-Paul_Fortress_%282%29.jpg/400px-Peter-and-Paul_Fortress_%282%29.jpg",
            3: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Saint_Isaac%27s_Cathedral_in_Saint_Petersburg.jpg/400px-Saint_Isaac%27s_Cathedral_in_Saint_Petersburg.jpg",
            4: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Mikhailovsky_Palace_2015.jpg/400px-Mikhailovsky_Palace_2015.jpg",
            5: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Summer_Garden_Fountain.jpg/400px-Summer_Garden_Fountain.jpg",
            6: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Palace_Bridge_Saint_Petersburg_2014.jpg/400px-Palace_Bridge_Saint_Petersburg_2014.jpg",
            7: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/New_Holland_Island_Arch.jpg/400px-New_Holland_Island_Arch.jpg",
            8: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Kunstkamera_%28Saint_Petersburg%29.jpg/400px-Kunstkamera_%28Saint_Petersburg%29.jpg",
            9: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Church_of_the_Savior_on_Blood_%28front_view%29.jpg/400px-Church_of_the_Savior_on_Blood_%28front_view%29.jpg",
            10: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Potseluev_Bridge.jpg/400px-Potseluev_Bridge.jpg"
        };
        
        return directImages[place.id] || null;
    }

    async function loadAllPhotos() {
        for (const place of placesData) {
            const photoUrl = await fetchPhotoForPlace(place);
            if (photoUrl) {
                place.photoUrl = photoUrl;
            }
        }
        renderCards();
        renderRecentViews();
    }

    // ---------- ГЛОБАЛЬНЫЕ ФУНКЦИИ ----------
    function showToast(message, isAdd = true) {
        const toast = document.getElementById('toastNotification');
        const toastIcon = document.getElementById('toastIcon');
        const toastMessage = document.getElementById('toastMessage');
        toastIcon.className = isAdd ? 'fas fa-heart' : 'fas fa-heart-broken';
        toastMessage.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function addToRecentViews(placeId) {
        recentViews = recentViews.filter(id => id !== placeId);
        recentViews.unshift(placeId);
        if (recentViews.length > 5) recentViews.pop();
        localStorage.setItem('recentViews', JSON.stringify(recentViews));
        renderRecentViews();
    }

    function renderRecentViews() {
        if (recentViews.length === 0) {
            recentSection.style.display = 'none';
            return;
        }
        recentSection.style.display = 'block';
        const recentPlaces = recentViews.map(id => placesData.find(p => p.id === id)).filter(p => p);
        recentGrid.innerHTML = recentPlaces.map(place => `
            <div class="recent-item" data-id="${place.id}">
                <div class="recent-img" style="background-image: url('${place.photoUrl || ''}'); background-size: cover; background-position: center; ${!place.photoUrl ? 'background: var(--filter-bg); display: flex; align-items: center; justify-content: center;' : ''}">
                    ${!place.photoUrl ? '<i class="fas fa-image" style="font-size: 2rem; color: var(--meta-color);"></i>' : ''}
                </div>
                <div class="recent-name">${escapeHtml(place.name)}</div>
            </div>
        `).join('');
        document.querySelectorAll('.recent-item').forEach(item => {
            item.addEventListener('click', () => {
                const id = parseInt(item.getAttribute('data-id'));
                openModalById(id);
            });
        });
    }

    function saveFavorites() { localStorage.setItem('favorites', JSON.stringify(favorites)); }

    function toggleFavorite(id, event) {
        event.stopPropagation();
        if (favorites.includes(id)) {
            favorites = favorites.filter(fid => fid !== id);
            showToast(`🗑️ Удалено из избранного`, false);
        } else {
            favorites.push(id);
            showToast(`❤️ Добавлено в избранное!`, true);
        }
        saveFavorites();
        renderCards();
    }

    function getFilteredAndSorted() {
        let filtered = placesData.filter(place => {
            if (currentFilter !== 'all' && place.category !== currentFilter) return false;
            if (showOnlyFavorites && !favorites.includes(place.id)) return false;
            const term = currentSearch.toLowerCase().trim();
            if (term) {
                return place.name.toLowerCase().includes(term) || place.shortDesc.toLowerCase().includes(term);
            }
            return true;
        });
        if (currentSort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if (currentSort === 'nameDesc') filtered.sort((a,b) => b.name.localeCompare(a.name));
        return filtered;
    }

    function updateMarkers() {
        if (!map || !yandexReady) return;
        placemarks.forEach(pm => map.geoObjects.remove(pm));
        placemarks = [];
        const filtered = getFilteredAndSorted();
        
        filtered.forEach(place => {
            const placemark = new ymaps.Placemark([place.lat, place.lng], {
                balloonContentHeader: place.name,
                balloonContentBody: `
                    <div style="max-width: 260px;">
                        ${place.photoUrl ? `<img src="${place.photoUrl}" style="width: 100%; border-radius: 12px; margin-bottom: 8px;">` : ''}
                        <p>${place.shortDesc}</p>
                        <p><strong>📍 Адрес:</strong> ${place.address}</p>
                        <p><strong>🚇 Метро:</strong> ${place.metro}</p>
                        <button onclick="window.openModalById(${place.id})" style="background:#1c4e6f; color:white; border:none; padding:6px 12px; border-radius:20px; margin-top:8px; cursor:pointer;">Подробнее</button>
                    </div>
                `,
                balloonContentFooter: ''
            }, {
                preset: 'islands#iconIcon',
                iconColor: place.category === 'museum' ? '#9b59b6' : (place.category === 'attraction' ? '#e67e22' : (place.category === 'park' ? '#2ecc71' : '#3498db'))
            });
            placemark.events.add('click', () => openModalById(place.id));
            map.geoObjects.add(placemark);
            placemarks.push(placemark);
        });
    }

    function renderCards() {
        const filtered = getFilteredAndSorted();
        resultsCounterSpan.innerText = `Найдено мест: ${filtered.length}`;
        if (filtered.length === 0) {
            container.innerHTML = `<div class="no-results"><i class="fas fa-heart-broken"></i><h3>Ничего не найдено</h3><p>Попробуйте изменить фильтр или поиск</p></div>`;
            return;
        }
        container.innerHTML = filtered.map(place => {
            const isFav = favorites.includes(place.id);
            const catName = { museum:'Музей', attraction:'Достопримечательность', park:'Парк', monument:'Памятник' }[place.category];
            return `
                <div class="place-card" data-id="${place.id}">
                    <div class="favorite-star" data-id="${place.id}">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart" style="color: #ffc107;"></i>
                    </div>
                    <div class="card-img-mini" style="background-image: url('${place.photoUrl || ''}'); background-size: cover; background-position: center; ${!place.photoUrl ? 'background: var(--filter-bg); display: flex; align-items: center; justify-content: center;' : ''}">
                        ${!place.photoUrl ? '<i class="fas fa-image" style="font-size: 2rem; color: var(--meta-color);"></i>' : ''}
                    </div>
                    <div class="card-content-mini">
                        <div class="place-name-mini">${escapeHtml(place.name)}</div>
                        <div class="place-cat-badge"><i class="fas ${place.category === 'museum' ? 'fa-landmark' : (place.category === 'attraction' ? 'fa-church' : (place.category === 'park' ? 'fa-tree' : 'fa-water'))}"></i> ${catName}</div>
                        <div class="place-desc-mini">${escapeHtml(place.shortDesc)}</div>
                        <div style="font-size:0.7rem; margin-top:4px;"><i class="fas fa-subway"></i> ${escapeHtml(place.metro)}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.favorite-star').forEach(star => {
            star.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(star.getAttribute('data-id'));
                toggleFavorite(id, e);
            });
        });
        document.querySelectorAll('.place-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.favorite-star')) return;
                const id = parseInt(card.getAttribute('data-id'));
                openModalById(id);
            });
        });
        updateMarkers();
    }

    let currentSharePlace = null;
    
    function openModalById(id) {
        const place = placesData.find(p => p.id === id);
        if (!place) return;
        currentSharePlace = place;
        addToRecentViews(id);
        
        document.getElementById('modalImg').style.backgroundImage = place.photoUrl ? `url('${place.photoUrl}')` : 'none';
        document.getElementById('modalImg').style.backgroundSize = 'cover';
        document.getElementById('modalImg').style.backgroundPosition = 'center';
        document.getElementById('modalImg').innerHTML = !place.photoUrl ? `<i class="fas fa-image" style="font-size: 4rem; color: var(--meta-color); display: flex; align-items: center; justify-content: center; height: 100%;"></i>` : '';
        document.getElementById('modalTitle').innerText = place.name;
        const catRu = { museum:'🏛️ Музей', attraction:'⛪ Достопримечательность', park:'🌳 Парк', monument:'🌉 Мост/Памятник' }[place.category];
        document.getElementById('modalCategoryBadge').innerHTML = catRu;
        document.getElementById('modalDesc').innerHTML = place.fullDesc;
        document.getElementById('modalMeta').innerHTML = `
            <div><i class="fas fa-location-dot"></i> <strong>Адрес:</strong> ${escapeHtml(place.address)}</div>
            <div><i class="fas fa-subway"></i> <strong>Метро:</strong> ${escapeHtml(place.metro)}</div>
            <div><i class="fas fa-clock"></i> <strong>Часы работы:</strong> ${escapeHtml(place.hours)}</div>
        `;
        document.getElementById('detailModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    window.openModalById = openModalById;

    async function shareCurrentPlace() {
        if (!currentSharePlace) return;
        const shareText = `${currentSharePlace.name} — ${currentSharePlace.shortDesc}\n📍 Адрес: ${currentSharePlace.address}\n🚇 Метро: ${currentSharePlace.metro}\n\nПутеводитель по Петербургу: ${window.location.href}`;
        if (navigator.share) {
            try { await navigator.share({ title: currentSharePlace.name, text: currentSharePlace.shortDesc, url: window.location.href }); } catch(e) {}
        } else {
            try { await navigator.clipboard.writeText(shareText); showToast(`📋 Ссылка на "${currentSharePlace.name}" скопирована!`, true); } catch(err) { alert('Не удалось скопировать ссылку'); }
        }
    }

    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
        document.body.style.overflow = '';
        currentSharePlace = null;
    }

    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) || ''; }

    async function fetchWeather() {
        try {
            const res = await fetch('https://wttr.in/Saint+Petersburg?format=%t+%c&lang=ru');
            const data = await res.text();
            document.getElementById('weatherText').innerHTML = `СПб: ${data.trim()}`;
        } catch(e) { document.getElementById('weatherText').innerHTML = '🌤️ +18°C (демо)'; }
    }

    function initTheme() { if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark'); }
    function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }

    window.addEventListener('scroll', () => { if (window.scrollY > 300) scrollBtn.classList.add('show'); else scrollBtn.classList.remove('show'); });
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // Инициализация Яндекс Карты
    function initYandexMap() {
        ymaps.ready(() => {
            yandexReady = true;
            map = new ymaps.Map("cityMap", {
                center: [59.9343, 30.3351],
                zoom: 13,
                controls: ['zoomControl', 'fullscreenControl']
            });
            
            // Добавляем поиск по карте
            const searchControl = new ymaps.control.SearchControl({
                options: { provider: 'yandex#search', size: 'large' }
            });
            map.controls.add(searchControl);
            
            renderCards();
            renderRecentViews();
        });
    }

    // Загружаем фото и инициализируем
    async function init() {
        initTheme();
        fetchWeather();
        setInterval(fetchWeather, 600000);
        
        // Загружаем фото для всех мест (используем резервные URL)
        for (const place of placesData) {
            // Используем резервные изображения из Wikimedia
            const imageUrls = {
                1: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Winter_Palace_from_above.jpg/400px-Winter_Palace_from_above.jpg",
                2: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Peter-and-Paul_Fortress_%282%29.jpg/400px-Peter-and-Paul_Fortress_%282%29.jpg",
                3: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Saint_Isaac%27s_Cathedral_in_Saint_Petersburg.jpg/400px-Saint_Isaac%27s_Cathedral_in_Saint_Petersburg.jpg",
                4: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Mikhailovsky_Palace_2015.jpg/400px-Mikhailovsky_Palace_2015.jpg",
                5: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Summer_Garden_Fountain.jpg/400px-Summer_Garden_Fountain.jpg",
                6: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Palace_Bridge_Saint_Petersburg_2014.jpg/400px-Palace_Bridge_Saint_Petersburg_2014.jpg",
                7: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/New_Holland_Island_Arch.jpg/400px-New_Holland_Island_Arch.jpg",
                8: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Kunstkamera_%28Saint_Petersburg%29.jpg/400px-Kunstkamera_%28Saint_Petersburg%29.jpg",
                9: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Church_of_the_Savior_on_Blood_%28front_view%29.jpg/400px-Church_of_the_Savior_on_Blood_%28front_view%29.jpg",
                10: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Potseluev_Bridge.jpg/400px-Potseluev_Bridge.jpg"
            };
            place.photoUrl = imageUrls[place.id] || '';
        }
        
        initYandexMap();
    }
    
    // Обработчики событий
    filterBtns.forEach(btn => btn.addEventListener('click', () => { currentFilter = btn.dataset.filter; filterBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderCards(); }));
    sortSelect.addEventListener('change', (e) => { currentSort = e.target.value; renderCards(); });
    searchInput.addEventListener('input', (e) => { currentSearch = e.target.value; renderCards(); });
    favoritesFilterBtn.addEventListener('click', () => { showOnlyFavorites = !showOnlyFavorites; showOnlyFavorites ? favoritesFilterBtn.classList.add('active') : favoritesFilterBtn.classList.remove('active'); renderCards(); });
    themeToggle.addEventListener('click', toggleTheme);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('shareModalBtn').addEventListener('click', shareCurrentPlace);
    document.getElementById('detailModal').addEventListener('click', (e) => { if(e.target === document.getElementById('detailModal')) closeModal(); });
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

    init();
</script>
</body>
</html>
