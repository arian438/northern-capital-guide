<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Петербургский гид | Путеводитель по Санкт-Петербургу</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="hero">
    <div class="container">
        <h1><i class="fas fa-map-location-dot"></i> Петербургский гид</h1>
        <div class="tagline">Карта, фото достопримечательностей, избранное и погода</div>
    </div>
</div>

<div class="container">
    <div class="top-bar">
        <div class="weather-widget" id="weatherWidget">
            <i class="fas fa-cloud-sun"></i>
            <span id="weatherText">Загрузка погоды...</span>
        </div>
        <div style="display: flex; gap: 12px;">
            <button id="favoritesFilterBtn" class="favorites-filter-btn"><i class="fas fa-heart"></i> Избранное</button>
            <button id="themeToggleBtn" class="theme-toggle"><i class="fas fa-moon"></i> Тёмная тема</button>
        </div>
    </div>

    <div class="filters-section">
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-star"></i> Все</button>
            <button class="filter-btn" data-filter="museum"><i class="fas fa-landmark"></i> Музеи</button>
            <button class="filter-btn" data-filter="attraction"><i class="fas fa-church"></i> Достопримечательности</button>
            <button class="filter-btn" data-filter="park"><i class="fas fa-tree"></i> Парки</button>
            <button class="filter-btn" data-filter="monument"><i class="fas fa-water"></i> Мосты и памятники</button>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <select id="sortSelect" class="sort-select">
                <option value="name">По названию (А-Я)</option>
                <option value="nameDesc">По названию (Я-А)</option>
                <option value="default">По умолчанию</option>
            </select>
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск...">
            </div>
        </div>
    </div>

    <div class="results-counter" id="resultsCounter">Найдено мест: --</div>

    <div class="two-columns">
        <div class="map-col">
            <div id="cityMap"></div>
        </div>
        <div class="places-col">
            <div id="placesContainer" class="places-grid"></div>
        </div>
    </div>

    <div class="recent-section" id="recentSection">
        <div class="recent-title">
            <i class="fas fa-history"></i> Недавно просмотренные
        </div>
        <div class="recent-grid" id="recentGrid"></div>
    </div>
</div>

<div class="footer">
    <i class="fas fa-map-marked-alt"></i> Интерактивный путеводитель | Карта OpenStreetMap | Избранное сохраняется
</div>
<button class="scroll-top" id="scrollTopBtn"><i class="fas fa-chevron-up"></i></button>

<div id="toastNotification" class="toast-notification">
    <i class="fas fa-heart" id="toastIcon"></i>
    <span id="toastMessage">Добавлено в избранное</span>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
        <div id="modalImg" class="modal-img"></div>
        <div class="modal-body">
            <h2 id="modalTitle"></h2>
            <div id="modalCategoryBadge" style="background:var(--modal-badge); border-radius:30px; padding:4px 12px; display:inline-block;"></div>
            <p id="modalDesc" style="margin: 15px 0;"></p>
            <div id="modalMeta"></div>
            <button id="shareModalBtn" class="share-btn">
                <i class="fas fa-share-alt"></i> Поделиться местом
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
